<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Grafos - UDB</title>
    <meta name="description" content="Laboratorio interactivo y presentación sobre algoritmos de caminos más cortos en grafos.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
            color: var(--text-main);
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 700px;
            width: 90%;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 3.5rem;
        }
        .links-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            max-width: 400px;
            margin: 0 auto;
        }
        .link-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem 1.5rem;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
            overflow: hidden;
        }
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .link-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            background: #233147;
        }
        .link-card:hover::before {
            opacity: 1;
        }
        .link-card h2 {
            margin: 0 0 0.75rem 0;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .link-card p {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        @media (min-width: 600px) {
            .links-grid {
                grid-template-columns: 1fr 1fr;
                max-width: 100%;
                gap: 2rem;
            }
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .subtitle { margin-bottom: 2rem; font-size: 1rem; }
            .container { padding: 1rem; width: 95%; }
            .link-card { padding: 1.5rem 1rem; }
            .link-card h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proyecto Grafos</h1>
        <p class="subtitle">Laboratorio Interactivo de Algoritmos de Caminos</p>
        
        <div class="links-grid">
            <a href="juego_grafos.html" class="link-card">
                <h2>🎮 El Juego</h2>
                <p>Aplica tus conocimientos resolviendo el tablero interactivo de nodos.</p>
            </a>
            <a href="presentacion.html" class="link-card">
                <h2>📚 Presentación</h2>
                <p>Explora la teoría matemática y algorítmica detrás del funcionamiento.</p>
            </a>
        </div>
    </div>
</body>
</html>
